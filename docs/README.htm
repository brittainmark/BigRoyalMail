<!DOCTYPE HTML>
<html lang="en-gb">
<head>
<title>Read Me Big royal Mail for Zen Cart</title>
<style media="screen">
.l2 {
    list-style-type: lower-alpha;
}

.l1 {
    list-style-type: decimal;
    margin-left: 10px;
}

.l3 {
    list-style-type: upper-roman;
    margin-left: 10px;
}
.ul {
    list-style-type: disc;
}

.l1 li {
    padding-top: 6px;
}

.ul li {
    padding-top: 0;
}

.l2 li {
    padding-top: 0px;
}

#donate {
    position: fixed;
    top: 0px;
    height: 8em;
    background-color: #eee;
    border: solid #000 1px;
    overflow: auto;
}

h1, h2, p {
    margin-left: 5px;
    margin-right: 5px;
}

#main {
    top: 8.1em;
    position: fixed;
    overflow-x: auto;
    overflow-y: scroll;
    height: calc(99% - 8em);
}
</style>
</head>
<body>
    <div id="donate">
        <h1>Big royal Mail</h1>
        <p>If you have found this useful and would like to reward the
            maintainer you can make a donation through paypal sending your
            donation to messages@inner-light.co.uk or follow this link
            <a href="https://www.innerlightworkers.co.uk/donate.htm">to
            Donate</a>"
        </p>
    </div>
    <div id="main">
        <h1>Documentation</h1>
        <p>The documentation is now in the github <a href="https://github.com/brittainmark/BigRoyalMail/wiki">wiki</a></p>
    </div>
</body>
</html>
